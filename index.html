<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aladin MVP</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
.container{max-width:420px;margin:60px auto;padding:20px;background:#fff;border-radius:10px}
input,button{width:100%;padding:10px;margin:8px 0}
button{background:#111;color:#fff;border:none;cursor:pointer}
.hidden{display:none}
h2{text-align:center}
</style>

<!-- Firebase (compat version for stability) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

</head>
<body>

<!-- LOGIN SCREEN -->
<div class="container" id="loginBox">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
  <p id="msg"></p>
</div>

<!-- APP SCREEN -->
<div class="container hidden" id="appBox">
  <h2>Aladin App</h2>

  <input type="text" id="custName" placeholder="Customer Name">
  <input type="number" id="custCredit" placeholder="Credit">
  <button onclick="addCustomer()">Add Customer</button>

  <hr>

  <div id="list"></div>

  <button onclick="logout()">Logout</button>
</div>

<script>
/* ================= FIREBASE CONFIG ================= */
// 🔴 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= UI ELEMENTS ================= */
const loginBox = document.getElementById("loginBox");
const appBox = document.getElementById("appBox");
const msg = document.getElementById("msg");

/* ================= AUTH ================= */
function signup(){
  const email = emailInput().value;
  const pass = passInput().value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(() => showApp())
  .catch(e => msg.innerText = e.message);
}

function login(){
  const email = emailInput().value;
  const pass = passInput().value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(() => showApp())
  .catch(e => msg.innerText = e.message);
}

function logout(){
  auth.signOut().then(() => {
    loginBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  });
}

/* ================= AUTH STATE FIX (IMPORTANT) ================= */
auth.onAuthStateChanged(user => {
  if(user){
    showApp();
  } else {
    loginBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  }
});

/* ================= APP LOGIC ================= */
function showApp(){
  loginBox.classList.add("hidden");
  appBox.classList.remove("hidden");
  loadCustomers();
}

/* ================= CUSTOMER STORAGE (FIXED) ================= */
function addCustomer(){
  const name = document.getElementById("custName").value.trim();
  const credit = document.getElementById("custCredit").value;

  if(!name) return alert("Name required");

  const customer = { name, credit };

  // Save to Firestore
  db.collection("customers").add(customer)
  .then(() => {
    document.getElementById("custName").value = "";
    document.getElementById("custCredit").value = "";
    loadCustomers();
  })
  .catch(() => {
    // fallback localStorage
    let data = JSON.parse(localStorage.getItem("customers") || "[]");
    data.push(customer);
    localStorage.setItem("customers", JSON.stringify(data));
    loadCustomers();
  });
}

function loadCustomers(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  // Try Firestore first
  db.collection("customers").get()
  .then(snapshot => {
    snapshot.forEach(doc => {
      const c = doc.data();
      list.innerHTML += `<div>${c.name} - ${c.credit}</div>`;
    });
  })
  .catch(() => {
    // fallback localStorage
    let data = JSON.parse(localStorage.getItem("customers") || "[]");
    data.forEach(c => {
      list.innerHTML += `<div>${c.name} - ${c.credit}</div>`;
    });
  });
}

/* ================= HELPERS ================= */
function emailInput(){ return document.getElementById("email"); }
function passInput(){ return document.getElementById("password"); }

</script>

</body>
</html>
